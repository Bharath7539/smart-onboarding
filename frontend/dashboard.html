<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Employee Onboarding</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2333;
      --border: #2a2f45;
      --accent: #4f6ef7;
      --accent2: #38d9a9;
      --danger: #f05252;
      --warn: #f7b955;
      --text: #e8eaf2;
      --muted: #6b7394;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.35);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-brand .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .role-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .role-badge.admin { background: rgba(240,82,82,0.15); color: var(--danger); border: 1px solid rgba(240,82,82,0.3); }
    .role-badge.user  { background: rgba(56,217,169,0.12); color: var(--accent2); border: 1px solid rgba(56,217,169,0.3); }

    .btn-logout {
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { background: var(--surface2); color: var(--text); }

    /* ── LAYOUT ── */
    .page {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 57px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 0;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 24px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all .18s;
      cursor: pointer;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: rgba(79,110,247,0.08);
      color: var(--text);
      border-left-color: var(--accent);
    }

    .sidebar-nav .icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-section {
      margin-top: 20px;
      padding: 0 24px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MAIN CONTENT ── */
    .main {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }

    /* ── SECTION PANELS ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .panel-body { padding: 24px; }

    /* ── FORM GRID ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-grid .span-2 { grid-column: span 2; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 500; }

    input[type="text"], input:not([type="file"]):not([type="submit"]):not([type="button"]) {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3d5ce8; }
    .btn-danger { background: rgba(240,82,82,0.15); color: var(--danger); border: 1px solid rgba(240,82,82,0.25); }
    .btn-danger:hover { background: rgba(240,82,82,0.25); }
    .btn-success { background: rgba(56,217,169,0.15); color: var(--accent2); border: 1px solid rgba(56,217,169,0.25); }
    .btn-success:hover { background: rgba(56,217,169,0.25); }

    /* ── EMPLOYEE CARDS ── */
    .emp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .employee-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }

    .employee-card:hover { border-color: rgba(79,110,247,0.4); }

    .emp-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
    }

    .emp-meta { font-size: 13px; color: var(--muted); }

    .doc-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 13px;
    }

    .doc-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .doc-item:last-child { border-bottom: none; }

    .badge {
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-done { background: rgba(56,217,169,0.12); color: var(--accent2); }
    .badge-pending { background: rgba(247,185,85,0.12); color: var(--warn); }
    .badge-complete { background: rgba(79,110,247,0.12); color: var(--accent); }

    .upload-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }

    .upload-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      background: rgba(79,110,247,0.1);
      border: 1px solid rgba(79,110,247,0.25);
      color: var(--accent);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background .18s;
    }

    .upload-label:hover { background: rgba(79,110,247,0.2); }

    /* ── LEAVE CARDS ── */
    .leave-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .leave-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .leave-type { font-weight: 600; font-size: 14px; text-transform: capitalize; }
    .leave-dates { font-size: 13px; color: var(--muted); }
    .leave-actions { display: flex; gap: 8px; margin-top: 4px; }

    /* ── ATTENDANCE ── */
    .attendance-wrapper {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
      align-items: start;
    }

    .camera-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    #video {
      width: 340px;
      height: 255px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      object-fit: cover;
      background: #000;
    }

    #attendanceResult {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      font-size: 14px;
      line-height: 1.7;
      min-height: 60px;
    }

    /* ── ATTENDANCE LOGS GRID ── */
    .att-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .att-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .att-name { font-weight: 600; font-size: 14px; }
    .att-dept { color: var(--muted); font-size: 12px; }
    .att-time { color: var(--muted); font-size: 12px; margin-top: 4px; }

    /* ── WEEKLY ANALYTICS ── */
    .weekly-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .weekly-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    .weekly-name {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .weekly-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .weekly-stat:last-child { border-bottom: none; }
    .weekly-stat .val { font-weight: 600; }

    .pct-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 10px 0 6px;
      overflow: hidden;
    }

    .pct-fill {
      height: 100%;
      background: var(--accent2);
      border-radius: 99px;
      transition: width .6s ease;
    }

    /* ── DIVIDER ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

    /* ── MISC ── */
    .completed-banner {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(56,217,169,0.1);
      border: 1px solid rgba(56,217,169,0.25);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      color: var(--accent2);
      font-size: 13px;
      font-weight: 600;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    #canvas { display: none; }

    .emp-group-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      color: var(--muted);
      padding: 8px 0 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .attendance-wrapper { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .span-2 { grid-column: span 1; }
    }
  </style>
</head>

<body>

<!-- TOP NAV -->
<header class="topbar">
  <div class="topbar-brand">
    <span class="dot"></span>
    Smart Onboarding
  </div>
  <div class="topbar-right">
    <span id="roleBadge" class="role-badge"></span>
    <button class="btn-logout" onclick="logout()">Log out</button>
  </div>
</header>

<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-nav">
      <div class="sidebar-section">Workspace</div>
      <a href="#employees" class="active"><span class="icon">👥</span> Employees</a>
      <a href="#leave"><span class="icon">📅</span> Leave Management</a>
      <a href="#attendance"><span class="icon">📷</span> Attendance</a>
      <a href="#analytics"><span class="icon">📊</span> Analytics</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- ── CREATE EMPLOYEE (admin) ── -->
    <div id="adminSection">
      <div class="panel" id="employees">
        <div class="panel-header">
          <span class="panel-title">Create Employee</span>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="field">
              <label>Full Name</label>
              <input id="name" placeholder="Jane Doe">
            </div>
            <div class="field">
              <label>Email Address</label>
              <input id="email" placeholder="jane@company.com">
            </div>
            <div class="field">
              <label>Department</label>
              <input id="department" placeholder="Engineering">
            </div>
            <div class="field">
              <label>Role</label>
              <input id="role" placeholder="Software Engineer">
            </div>
            <div class="field">
              <label>Manager</label>
              <input id="manager" placeholder="Manager name">
            </div>
            <div class="field">
              <label>Joining Date</label>
              <input id="joining_date" placeholder="YYYY-MM-DD">
            </div>
            <div class="span-2" style="padding-top:4px;">
              <button class="btn btn-primary" onclick="createEmployee()">＋ Create Employee</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── EMPLOYEES LIST ── -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">All Employees</span>
      </div>
      <div class="panel-body">
        <div id="output" class="emp-grid"></div>
      </div>
    </div>

    <!-- ── LEAVE MANAGEMENT ── -->
    <div class="panel" id="leave">
      <div class="panel-header">
        <span class="panel-title">Leave Management</span>
      </div>
      <div class="panel-body" style="display:flex;flex-direction:column;gap:24px;">

        <!-- Apply leave (employee only) -->
        <div id="leaveApplySection">
          <div class="section-label">Apply for Leave</div>
          <div class="form-grid">
            <div class="field">
              <label>Leave Type</label>
              <input id="leave_type" placeholder="sick / casual">
            </div>
            <div class="field">
              <label>Reason</label>
              <input id="reason" placeholder="Brief reason">
            </div>
            <div class="field">
              <label>Start Date</label>
              <input id="start_date" placeholder="YYYY-MM-DD">
            </div>
            <div class="field">
              <label>End Date</label>
              <input id="end_date" placeholder="YYYY-MM-DD">
            </div>
            <div class="span-2">
              <button class="btn btn-primary" onclick="applyLeave()">Submit Request</button>
            </div>
          </div>
        </div>

        <hr class="divider">

        <!-- Leave requests -->
        <div>
          <div class="section-label">Leave Requests</div>
          <div id="leaveOutput" class="leave-grid"></div>
        </div>
      </div>
    </div>

    <!-- ── ATTENDANCE ── -->
    <div class="panel" id="attendance">
      <div class="panel-header">
        <span class="panel-title">Attendance — Mark via Camera</span>
      </div>
      <div class="panel-body">
        <div class="attendance-wrapper">
          <div class="camera-box">
            <video id="video" autoplay></video>
            <button class="btn btn-primary" onclick="markAttendance()">📸 Mark Attendance</button>
            <canvas id="canvas" width="400" height="300"></canvas>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div class="section-label">Result</div>
            <div id="attendanceResult" style="color:var(--muted);font-size:13px;">Capture your face to mark attendance.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── TODAY'S LOGS ── -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Today's Attendance</span>
      </div>
      <div class="panel-body">
        <div id="attendanceLogs" class="att-grid"></div>
      </div>
    </div>

    <!-- ── WEEKLY ANALYTICS ── -->
    <div class="panel" id="analytics">
      <div class="panel-header">
        <span class="panel-title">Weekly Attendance Analytics</span>
      </div>
      <div class="panel-body">
        <div id="weeklySummary" class="weekly-grid"></div>
      </div>
    </div>

  </main>
</div>

<!-- ════════════════ JS (logic unchanged) ════════════════ -->
<script>

const API_URL = "https://6aot2047ff.execute-api.ap-south-2.amazonaws.com";

let isAdmin = false;
let currentUserEmail = "";
let currentEmployeeId = null;

/* ---------- AUTH ---------- */
function getToken() {
  const token = localStorage.getItem("token");
  if (!token) { alert("Please login again"); window.location.href = "login.html"; return null; }
  return token;
}

function parseJwt(token) {
  return JSON.parse(atob(token.split('.')[1]));
}

function checkRole() {
  const token = getToken();
  if (!token) return;
  const payload = parseJwt(token);
  currentUserEmail = payload.email;
  const groups = payload["cognito:groups"] || [];
  const badge = document.getElementById("roleBadge");
  if (groups.includes("admin")) {
    isAdmin = true;
    badge.innerText = "Admin";
    badge.className = "role-badge admin";
  } else {
    isAdmin = false;
    badge.innerText = "User";
    badge.className = "role-badge user";
    document.getElementById("adminSection").style.display = "none";
  }
  if (isAdmin) document.getElementById("leaveApplySection").style.display = "none";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

/* ---------- API ---------- */
async function apiRequest(path, method = "GET", body = null) {
  const token = getToken();
  if (!token) return;
  try {
    const res = await fetch(API_URL + path, {
      method,
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
      body: body ? JSON.stringify(body) : null
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.message || "Request failed");
    return data;
  } catch (err) { console.error(err); alert(err.message); }
}

/* ---------- STATUS HELPERS ---------- */
function status(value) { return value === "completed" ? "completed" : "pending"; }
function badgeClass(value) { return value === "completed" ? "badge-done" : "badge-pending"; }
function badgeLabel(value) { return value === "completed" ? "Done" : "Pending"; }

/* ---------- CREATE EMPLOYEE ---------- */
async function createEmployee() {
  if (!isAdmin) { alert("Only admin allowed"); return; }
  const nameVal  = document.getElementById("name").value.trim();
  const emailVal = document.getElementById("email").value.trim();
  const deptVal  = document.getElementById("department").value;
  const roleVal  = document.getElementById("role").value;
  const managerVal = document.getElementById("manager").value;
  const jdVal    = document.getElementById("joining_date").value;
  if (!nameVal || !emailVal) { alert("Name and Email are required"); return; }
  const data = { name: nameVal, email: emailVal, department: deptVal, role: roleVal, manager: managerVal, joining_date: jdVal, employment_type: "Full-time" };
  const res = await apiRequest("/register", "POST", data);
  if (res) { alert(res.message); loadEmployees(); }
}

/* ---------- LOAD EMPLOYEES ---------- */
async function loadEmployees() {
  const data = await apiRequest("/employees");
  if (!data) return;
  let html = "";
  data.forEach(emp => {
    if (emp.email === currentUserEmail) { currentEmployeeId = emp.employee_id; }
    const onboarding = emp.onboarding || {};
    const docs = emp.documents || {};
    const doc = onboarding.document === "completed" ? "completed" : "pending";
    const it  = status(onboarding.it_provisioning);
    const pol = status(onboarding.policy);
    const isOwner = emp.email === currentUserEmail;
    const allDone = doc === "completed" && it === "completed" && pol === "completed";

    html += `
      <div class="employee-card">
        <div>
          <div class="emp-name">${emp.name}</div>
          <div class="emp-meta">${emp.email}</div>
          <div class="emp-meta">${emp.department}</div>
        </div>
        <div class="doc-row">
          <div class="doc-item"><span>ID Proof</span> <span class="badge ${badgeClass(docs.id_proof)}">${badgeLabel(docs.id_proof)}</span></div>
          <div class="doc-item"><span>Degree</span>   <span class="badge ${badgeClass(docs.degree)}">${badgeLabel(docs.degree)}</span></div>
          <div class="doc-item"><span>Offer Letter</span> <span class="badge ${badgeClass(docs.offer_letter)}">${badgeLabel(docs.offer_letter)}</span></div>
        </div>
        ${allDone ? `<div class="completed-banner">✔ Fully Onboarded</div>` : ""}
        ${isAdmin
          ? `<button class="btn btn-danger" onclick="deleteEmployee('${emp.email}')">Delete</button>`
          : isOwner
            ? onboarding.document !== "completed"
              ? `<div class="upload-row">
                  <label class="upload-label">📎 ID Proof <input type="file" hidden onchange="uploadDoc(event,'${emp.employee_id}','id_proof')"></label>
                  <label class="upload-label">📎 Degree <input type="file" hidden onchange="uploadDoc(event,'${emp.employee_id}','degree')"></label>
                  <label class="upload-label">📎 Offer Letter <input type="file" hidden onchange="uploadDoc(event,'${emp.employee_id}','offer_letter')"></label>
                </div>`
              : `<div class="completed-banner">✔ All Documents Uploaded</div>`
            : ""
        }
      </div>`;
  });
  document.getElementById("output").innerHTML = html;
}

/* ---------- DELETE ---------- */
async function deleteEmployee(email) {
  if (!isAdmin) { alert("Only admin allowed"); return; }
  const res = await apiRequest("/employees", "DELETE", { email });
  if (res) { alert(res.message); loadEmployees(); }
}

/* ---------- UPLOAD ---------- */
function uploadDoc(event, employeeId, docType) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];
    const fileType = file.name.split('.').pop().toLowerCase();
    const res = await apiRequest("/upload", "POST", { employee_id: employeeId, file: base64, type: fileType, doc_type: docType });
    if (res) { alert(docType + " uploaded"); loadEmployees(); }
  };
  reader.readAsDataURL(file);
}

/* ---------- LEAVES ---------- */
async function applyLeave() {
  const leaveType = document.getElementById("leave_type").value.trim();
  const startDate = document.getElementById("start_date").value.trim();
  const endDate   = document.getElementById("end_date").value.trim();
  const reason    = document.getElementById("reason").value.trim();
  const employeeId = currentEmployeeId;
  if (!employeeId || !leaveType || !startDate || !endDate) { alert("All fields required"); return; }
  const res = await fetch(API_URL + "/apply-leave", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + getToken() },
    body: JSON.stringify({ employee_id: employeeId, leave_type: leaveType, start_date: startDate, end_date: endDate, reason })
  });
  const data = await res.json();
  alert(data.message || data.error);
  loadLeaves();
}

async function loadLeaves() {
  const data = await apiRequest("/leaves");
  if (!data) return;
  let leaves = data;
  if (!isAdmin) leaves = data.filter(l => l.employee_id === currentEmployeeId);
  let html = "";

  if (isAdmin) {
    const grouped = {};
    leaves.forEach(l => { if (!grouped[l.employee_id]) grouped[l.employee_id] = []; grouped[l.employee_id].push(l); });
    Object.keys(grouped).forEach(empId => {
      html += `<div style="grid-column:1/-1;" class="emp-group-title">Employee: ${empId}</div>`;
      grouped[empId].forEach(leave => { html += renderLeaveCard(leave, false); });
    });
  } else {
    leaves.forEach(leave => { html += renderLeaveCard(leave, true); });
  }
  document.getElementById("leaveOutput").innerHTML = html;
}

function renderLeaveCard(leave, isUserView) {
  const sc = leave.status === "APPROVED" ? "var(--accent2)" : leave.status === "REJECTED" ? "var(--danger)" : "var(--warn)";
  return `
    <div class="leave-card">
      <div class="leave-type">${leave.leave_type}</div>
      <div class="leave-dates">📅 ${leave.from_date} → ${leave.to_date}</div>
      <div style="font-size:13px;">Status: <b style="color:${sc}">${leave.status}</b></div>
      ${isAdmin && leave.status === "PENDING"
        ? `<div class="leave-actions">
             <button class="btn btn-success" onclick="approveLeave('${leave.employee_id}','${leave.request_id}','APPROVE')">Approve</button>
             <button class="btn btn-danger" onclick="approveLeave('${leave.employee_id}','${leave.request_id}','REJECT')">Reject</button>
           </div>`
        : ""}
      ${isUserView ? `<div style="color:var(--muted);font-size:12px;">Your request</div>` : ""}
    </div>`;
}

async function approveLeave(employee_id, request_id, action) {
  if (!isAdmin) { alert("Only admin allowed"); return; }
  const res = await apiRequest("/approve-leave", "POST", { employee_id, request_id, action });
  if (res) { alert("Leave " + action + " successful"); loadLeaves(); }
}

/* ---------- ATTENDANCE ---------- */
const ATTENDANCE_API = 'https://9gz0er02zk.execute-api.ap-south-1.amazonaws.com';
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');

navigator.mediaDevices.getUserMedia({ video: true }).then(stream => { video.srcObject = stream; });

async function markAttendance() {
  try {
    const resultDiv = document.getElementById('attendanceResult');
    resultDiv.innerHTML = 'Capturing image…';
    const context = canvas.getContext('2d');
    context.drawImage(video, 0, 0, 400, 300);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
    resultDiv.innerHTML = 'Getting upload URL…';
    const uploadResponse = await fetch(ATTENDANCE_API + '/upload-url');
    const uploadData = await uploadResponse.json();
    resultDiv.innerHTML = 'Uploading image…';
    await fetch(uploadData.uploadUrl, { method: 'PUT', headers: { 'Content-Type': 'image/jpeg' }, body: blob });
    resultDiv.innerHTML = 'Marking attendance…';
    const attendanceResponse = await fetch(ATTENDANCE_API + '/attendance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ imageKey: uploadData.imageKey }) });
    const attendanceData = await attendanceResponse.json();
    resultDiv.innerHTML = `<b>${attendanceData.message}</b><br>Employee: ${attendanceData.name || ''}<br>Confidence: ${attendanceData.confidence || ''}`;
    loadAttendanceLogs();
    loadWeeklySummary();
  } catch (error) {
    console.error(error);
    document.getElementById('attendanceResult').innerHTML = 'Attendance failed';
  }
}

async function loadAttendanceLogs() {
  try {
    const response = await fetch('https://9gz0er02zk.execute-api.ap-south-1.amazonaws.com/today-attendance');
    const data = await response.json();
    let html = '';
    data.forEach(item => {
      html += `
        <div class="att-card">
          <div class="att-name">${item.name}</div>
          <div class="att-dept">${item.department}</div>
          <div style="font-size:13px;">Status: <b>${item.status}</b></div>
          <div class="att-time">${item.timestamp}</div>
        </div>`;
    });
    document.getElementById('attendanceLogs').innerHTML = html;
  } catch (error) { console.error(error); }
}

async function loadWeeklySummary() {
  try {
    const response = await fetch('https://9gz0er02zk.execute-api.ap-south-1.amazonaws.com/weekly-summary');
    const data = await response.json();
    let html = '';
    data.forEach(item => {
      const pct = parseFloat(item.attendancePercentage) || 0;
      html += `
        <div class="weekly-card">
          <div class="weekly-name">${item.name}</div>
          <div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">${pct}% attendance</div>
          <div class="weekly-stat"><span>Present</span><span class="val" style="color:var(--accent2)">${item.presentDays}</span></div>
          <div class="weekly-stat"><span>Absent</span><span class="val" style="color:var(--danger)">${item.absentDays}</span></div>
          <div class="weekly-stat"><span>Late</span><span class="val" style="color:var(--warn)">${item.lateDays}</span></div>
        </div>`;
    });
    document.getElementById('weeklySummary').innerHTML = html;
  } catch (error) { console.error(error); }
}

/* ---------- INIT ---------- */
window.onload = () => {
  checkRole();
  loadEmployees();
  loadLeaves();
  loadAttendanceLogs();
  loadWeeklySummary();
};
</script>
