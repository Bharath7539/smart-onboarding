<div class="container">

  </div>

  <h3>Employees</h3>
  <div id="output"></div>

  <h3>Leave Management</h3>

<!-- Employee Apply Leave -->
<div id="leaveApplySection">
  <h4>Apply Leave</h4>

  <input id="leave_type" placeholder="Leave Type (sick/casual)">
  <input id="start_date" placeholder="Start Date (YYYY-MM-DD)">
  <input id="end_date" placeholder="End Date (YYYY-MM-DD)">
  <input id="reason" placeholder="Reason">

  <button class="btn-primary" onclick="applyLeave()">Apply Leave</button>

<script>

const API_URL = "https://6aot2047ff.execute-api.ap-south-2.amazonaws.com";

let isAdmin = false;
let currentUserEmail = "";
let currentEmployeeId = null;

/* ---------- AUTH ---------- */

function getToken() {
  const token = localStorage.getItem("token");
  if (!token) {
    alert("Please login again");
    window.location.href = "login.html";
    return null;
  }
  return token;
}

function parseJwt(token) {
  return JSON.parse(atob(token.split('.')[1]));
}

function checkRole() {
  const token = getToken();
  if (!token) return;

  const payload = parseJwt(token);
  currentUserEmail = payload.email;


  const groups = payload["cognito:groups"] || [];

  if (groups.includes("admin")) {
    isAdmin = true;
    roleBadge.innerText = "Admin";
    roleBadge.style.background = "#dc3545";
  } else {
    isAdmin = false;
    roleBadge.innerText = "User";
    roleBadge.style.background = "#28a745";
    adminSection.style.display = "none";
  }
  if (isAdmin) {
  document.getElementById("leaveApplySection").style.display = "none";
}
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

/* ---------- API ---------- */

async function apiRequest(path, method = "GET", body = null) {

  const token = getToken();
  if (!token) return;

  try {
    const res = await fetch(API_URL + path, {
      method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: body ? JSON.stringify(body) : null
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || data.message || "Request failed");
    }

    return data;

  } catch (err) {
    console.error(err);
    alert(err.message);
  }
}

/* ---------- STATUS ---------- */

function status(value) {
  return value === "completed" ? "completed" : "pending";
}

function color(value) {
  return value === "completed" ? "green" : "red";
}

/* ---------- CREATE ---------- */

async function createEmployee() {

  if (!isAdmin) {
    alert("Only admin allowed");
    return;
  }

  // ✅ CORRECT way to read inputs
  const nameVal = document.getElementById("name").value.trim();
  const emailVal = document.getElementById("email").value.trim();
  const deptVal = document.getElementById("department").value;
  const roleVal = document.getElementById("role").value;
  const managerVal = document.getElementById("manager").value;
  const jdVal = document.getElementById("joining_date").value;

  // ✅ validation
  if (!nameVal || !emailVal) {
    alert("Name and Email are required");
    return;
  }

  const data = {
    name: nameVal,
    email: emailVal,
    department: deptVal,
    role: roleVal,
    manager: managerVal,
    joining_date: jdVal,
    employment_type: "Full-time"
  };

  console.log("Sending data:", data); // 🔍 debug

  const res = await apiRequest("/register", "POST", data);

  if (res) {
    alert(res.message);
    loadEmployees();
  }
}
/* ---------- LOAD ---------- */

async function loadEmployees() {

  const data = await apiRequest("/employees");
  if (!data) return;

  let html = "";

 data.forEach(emp => {

   if (emp.email === currentUserEmail) {
      currentEmployeeId = emp.employee_id;
      console.log("✅ Employee ID mapped:", currentEmployeeId);
    }

  const onboarding = emp.onboarding || {};
  const docs = emp.documents || {};

  const doc = onboarding.document === "completed" ? "completed" : "pending";
  const it = status(onboarding.it_provisioning);
  const policy = status(onboarding.policy);

  const isOwner = emp.email === currentUserEmail;

  html += `
    <div class="employee-card">

      <b>${emp.name}</b><br>
      ${emp.email}<br>
      ${emp.department}<br><br>

      ID Proof: <span style="color:${color(docs.id_proof)}">${docs.id_proof || "pending"}</span><br>
      Degree: <span style="color:${color(docs.degree)}">${docs.degree || "pending"}</span><br>
      Offer Letter: <span style="color:${color(docs.offer_letter)}">${docs.offer_letter || "pending"}</span><br><br>

      
      ${
        doc === "completed" && it === "completed" && policy === "completed"
          ? `<div class="uploaded">✔ Fully Completed</div>`
          : ""
      }

      ${
        isAdmin
          ? `<button class="btn-danger" onclick="deleteEmployee('${emp.email}')">Delete</button>`
          : isOwner
            ? (
                onboarding.document !== "completed"
                
  ? `
  <div>
    <label class="upload-btn">
      Upload ID Proof
      <input type="file" hidden onchange="uploadDoc(event,'${emp.employee_id}','id_proof')">
    </label>

    <label class="upload-btn">
      Upload Degree
      <input type="file" hidden onchange="uploadDoc(event,'${emp.employee_id}','degree')">
    </label>

    <label class="upload-btn">
      Upload Offer Letter
      <input type="file" hidden onchange="uploadDoc(event,'${emp.employee_id}','offer_letter')">
    </label>
  </div>
`
  : `<div class="uploaded">✔ All Documents Uploaded</div>`
              )
            : ""
      }

    </div>
  `;
});

  output.innerHTML = html;
}

/* ---------- DELETE ---------- */

async function deleteEmployee(email) {

  if (!isAdmin) {
    alert("Only admin allowed");
    return;
  }

  const res = await apiRequest("/employees", "DELETE", { email });

  if (res) {
    alert(res.message);
    loadEmployees();
  }
}

/* ---------- UPLOAD ---------- */

function uploadDoc(event, employeeId, docType) {

  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async () => {

    const base64 = reader.result.split(",")[1];
    const fileType = file.name.split('.').pop().toLowerCase();

    const res = await apiRequest("/upload", "POST", {
      employee_id: employeeId,
      file: base64,
      type: fileType,
      doc_type: docType   // ✅ IMPORTANT
    });

    if (res) {
      alert(docType + " uploaded");
      loadEmployees();
    }
  };

  reader.readAsDataURL(file);
}

const employeeId = localStorage.getItem("employee_id");
console.log("Employee ID:", employeeId);

async function applyLeave() {

    const leaveType = document.getElementById("leave_type").value.trim();
    const startDate = document.getElementById("start_date").value.trim();
    const endDate = document.getElementById("end_date").value.trim();
    const reason = document.getElementById("reason").value.trim();

    const employeeId = currentEmployeeId;

    console.log("Sending employee_id:", employeeId);

    if (!employeeId || !leaveType || !startDate || !endDate) {
        alert("All fields required");
        return;
    }

    const res = await fetch(API_URL + "/apply-leave", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getToken()
        },
        body: JSON.stringify({
            employee_id: employeeId,
            leave_type: leaveType,
            start_date: startDate,
            end_date: endDate,
            reason: reason
        })
    });

    const data = await res.json();
    console.log("Response:", data);

    alert(data.message || data.error);

    loadLeaves();
}

async function loadLeaves() {

  const data = await apiRequest("/leaves");
  if (!data) return;

  let html = "";

  // ✅ USER → only their leaves
  let leaves = data;
  if (!isAdmin) {
    leaves = data.filter(l => l.employee_id === currentEmployeeId);
  }

  // ✅ ADMIN → group by employee
  if (isAdmin) {

    const grouped = {};

    leaves.forEach(l => {
      if (!grouped[l.employee_id]) {
        grouped[l.employee_id] = [];
      }
      grouped[l.employee_id].push(l);
    });

    Object.keys(grouped).forEach(empId => {

      html += `<h4 style="margin-top:15px;">Employee: ${empId}</h4>`;

      grouped[empId].forEach(leave => {

        html += renderLeaveCard(leave, false);
      });
    });

  } else {
    // USER VIEW
    leaves.forEach(leave => {
      html += renderLeaveCard(leave, true);
    });
  }

  document.getElementById("leaveOutput").innerHTML = html;
}

function renderLeaveCard(leave, isUserView) {

  const statusColor =
    leave.status === "APPROVED" ? "green" :
    leave.status === "REJECTED" ? "red" : "orange";

  return `
    <div class="employee-card">
      <b>${leave.leave_type}</b><br>
      ${leave.from_date} → ${leave.to_date}<br>
      Status: <b style="color:${statusColor}">${leave.status}</b><br>

      ${
        isAdmin && leave.status === "PENDING"
          ? `
            <button class="btn-primary" onclick="approveLeave('${leave.employee_id}','${leave.request_id}','APPROVE')">Approve</button>
            <button class="btn-danger" onclick="approveLeave('${leave.employee_id}','${leave.request_id}','REJECT')">Reject</button>
          `
          : ""
      }

      ${
        isUserView
          ? `<div style="color:#666;margin-top:5px;">Your request</div>`
          : ""
      }
    </div>
  `;
}

async function approveLeave(employee_id, request_id, action) {

  if (!isAdmin) {
    alert("Only admin allowed");
    return;
  }

  const res = await apiRequest("/approve-leave", "POST", {
    employee_id,
    request_id,
    action
  });

  if (res) {
    alert("Leave " + action + " successful");

    // ✅ refresh UI
    loadLeaves();
  }
}
/* ---------- INIT ---------- */

window.onload = () => {
  checkRole();
  loadEmployees();
  loadLeaves();   
};

</script>

</body>
